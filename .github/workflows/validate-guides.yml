name: Validate Guides Structure

on:
  push:
    paths:
      - 'guias/**/*.html'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate ecosystem block
        run: |
          FAIL=0

          while IFS= read -r file; do
            if ! grep -q '<section class="ecosystem-box">' "$file"; then
              echo "❌ Missing ecosystem-box in $file"
              FAIL=1
            fi
          done < <(find guias -mindepth 2 -maxdepth 2 -type f -name "index.html")

          if [ $FAIL -eq 1 ]; then
            echo "Build failed due to missing ecosystem block."
            exit 1
          fi